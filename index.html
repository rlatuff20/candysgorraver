<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike Caps | Catálogo Digital Interactivo</title>
    <style>
        /* --- TUS VARIABLES ORIGINALES --- */
        :root {
            --nike-black: #060606;
            --nike-gray: #e6f2ff;
            --white: #ffffff;
            --text-muted: #707070;
            --whatsapp-green: #25D366;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { background-color: var(--nike-gray); color: var(--nike-black); overflow-x: hidden; }

        /* Navegación */
        header { background-color: var(--white); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #080808; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 28px; font-weight: 900; letter-spacing: -1.5px; text-transform: uppercase; text-decoration: none; color: var(--nike-black); }
        
        .cart-icon { background: none; border: none; font-size: 1.3rem; cursor: pointer; position: relative; display: inline-block; }
        .cart-badge { position: absolute; top: -8px; right: -10px; background-color: var(--nike-black); color: var(--white); font-size: 0.7rem; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }

        /* Hero */
        .hero { background-color: var(--nike-black); color: var(--white); text-align: center; padding: 80px 20px; }
        .hero h1 { font-size: 3rem; text-transform: uppercase; margin-bottom: 10px; letter-spacing: -1px; }

        /* Contenedor Principal */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; padding-bottom: 100px; }
        .section-title { font-size: 1.8rem; margin-bottom: 30px; font-weight: 700; }

        /* Grid de Productos */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { background: var(--white); border-radius: 9px; overflow: hidden; transition: transform 0.3s ease; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
        .card-img-container { width: 100%; height: 300px; background-color: #ededed; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card img { max-width: 100%; max-height: 100%; object-fit: cover; }
        .card-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-title { font-size: 1.1rem; font-weight: 700; }
        .card-price { font-size: 1.2rem; font-weight: 600; margin-top: 10px; }
        .btn { width: 100%; padding: 12px; background-color: var(--nike-black); color: var(--white); border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 15px; }

        /* Carrito Lateral */
        .cart-panel { position: fixed; top: 0; right: -400px; width: 400px; max-width: 100%; height: 100%; background: var(--white); box-shadow: -5px 0 15px rgba(0,0,0,0.1); z-index: 2000; transition: right 0.3s ease; display: flex; flex-direction: column; padding: 20px; }
        .cart-panel.open { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .cart-items { flex-grow: 1; overflow-y: auto; }
        .cart-item { display: flex; gap: 15px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #f0f0f0; align-items: center; }
        .cart-item-img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1500; display: none; }
        .overlay.open { display: block; }
        .btn-whatsapp { background-color: var(--whatsapp-green); color: white; margin-top: 15px; }

        /* --- ANIMACIONES RECUPERADAS Y MEJORADAS --- */
        @keyframes salto {
            0% { transform: scale(1); }
            50% { transform: scale(1.5); }
            100% { transform: scale(1); }
        }

        @keyframes temblar {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        @keyframes papeleraVibrar {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(20deg) scale(1.3); }
            50% { transform: rotate(-20deg) scale(1.3); }
            100% { transform: rotate(0deg) scale(1); }
        }

        .anim-add { animation: salto 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important; }
        .anim-remove { animation: temblar 0.3s linear !important; }
        .anim-papelera { animation: papeleraVibrar 0.4s ease !important; color: red !important; }

        .delete-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; transition: transform 0.2s; }
        .delete-btn:hover { transform: scale(1.2); }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">Nike</a>
        <button class="cart-icon" onclick="toggleCart()">
            <span id="cart-icon-inner" style="display:inline-block;">🛒</span>
            <span class="cart-badge" id="cart-count">0</span>
        </button>
    </header>

    <section class="hero">
        <h1>LAS MEJORES GORRAS.</h1>
        <p>Tu mejor opción. Elige tus favoritas y haz tu pedido.</p>
    </section>

    <main class="container">
        <h2 class="section-title">Catálogo Disponible</h2>
        <div class="product-grid" id="product-grid"></div>
    </main>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <div class="cart-panel" id="cart-panel">
        <div class="cart-header">
            <h3>Tu Pedido</h3>
            <button onclick="toggleCart()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button>
        </div>
        <div class="cart-items" id="cart-items-container"></div>
        <div style="border-top:2px solid #000; padding-top:20px; margin-top: auto;">
            <div style="display:flex; justify-content:space-between; font-weight:700; font-size:1.2rem;">
                <span>Total Estimado:</span> <span id="cart-total-price">$0.00</span>
            </div>
            <button class="btn btn-whatsapp" onclick="enviarPedido()">💬 Pedir por WhatsApp</button>
        </div>
    </div>

    <script>
       const products = [
            { id: 1, name: 'New Era New York Yankees', category: 'New Era', price: 55.00, img: 'yanke.webp' },
            { id: 2, name: 'New Era LA Dodgers', category: 'New Era', price: 50.00, img: 'LA.avif' },
            { id: 3, name: 'New Era Chicago Cubs', category: 'New Era', price: 56.90, img: 'chicago.jpg' }, // <-- Coma agregada
            { id: 4, name: 'Arreglo Lirio decorado', category: 'Flores', price: 35.00, img: 'arreglos1.jpeg' },
            { id: 5, name: 'Bouquet mix 3 gerberas + 3 rosas', category: 'Flores', price: 55.00, img: 'arreglos2.jpeg' },
            { id: 6, name: 'Box de corazon 24 rosas + 3 chocolates', category: 'Flores', price: 100.00, img: 'arreglos3.jpeg' }, // <-- Coma agregada
            { id: 7, name: 'Rosa premium decorada', category: 'Flores', price: 45.50, img: 'arreglos4.jpeg' } // <-- Cambiado a id: 7
        ];

        let cart = [];

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="card">
                    <div class="card-img-container"><img src="${p.img}"></div>
                    <div class="card-info">
                        <div>
                            <div class="card-title">${p.name}</div>
                            <div style="color:gray; font-size:0.9rem;">${p.category}</div>
                        </div>
                        <div>
                            <div class="card-price">$${p.price.toFixed(2)}</div>
                            <button class="btn" onclick="addToCart(${p.id})">Añadir al Pedido</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleCart() {
            document.getElementById('cart-panel').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }

        function updateUI() {
            const count = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('cart-count').innerText = count;
            const container = document.getElementById('cart-items-container');
            
            if(cart.length === 0) {
                container.innerHTML = '<p style="text-align:center; margin-top:20px;">Aún no has seleccionado nada.</p>';
            } else {
                container.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <img src="${item.img}" class="cart-item-img">
                        <div style="flex-grow:1;">
                            <div style="font-weight:600; font-size:0.9rem;">${item.name}</div>
                            <div style="font-size:0.8rem;">$${item.price.toFixed(2)} x ${item.qty}</div>
                        </div>
                        <button class="delete-btn" onclick="animarYEliminar(event, ${item.id})">🗑️</button>
                    </div>
                `).join('');
            }
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('cart-total-price').innerText = `$${total.toFixed(2)}`;
        }

        function addToCart(id) {
            const prod = products.find(p => p.id === id);
            const inCart = cart.find(i => i.id === id);
            if(inCart) inCart.qty++; else cart.push({...prod, qty: 1});
            updateUI();
            triggerMainAnim('anim-add');
        }

        function animarYEliminar(event, id) {
            const btn = event.target;
            btn.classList.add('anim-papelera'); // El basurero baila
            triggerMainAnim('anim-remove');    // El carrito de arriba vibra
            
            setTimeout(() => {
                cart = cart.filter(i => i.id !== id);
                updateUI();
            }, 450); // Espera a que termine el baile para borrar
        }

        function triggerMainAnim(className) {
            const target = document.getElementById('cart-icon-inner');
            target.classList.remove('anim-add', 'anim-remove');
            void target.offsetWidth; 
            target.classList.add(className);
            setTimeout(() => target.classList.remove(className), 400);
        }

        function enviarPedido() {
            if(cart.length === 0) return alert("Carrito vacío");
            let msg = "¡Holaa! quisiera hacer un pedido:%0A";
            cart.forEach(i => msg += `- ${i.qty}x ${i.name}%0A`);
            window.open(`https://wa.me/584248959934?text=${msg}`, '_blank');
        }

        renderProducts();
    </script>
</body>
</html>
